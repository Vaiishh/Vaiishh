<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" font-family="'JetBrains Mono','Fira Code','SF Mono',Menlo,Consolas,monospace">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2BBC8A"/>
      <stop offset="100%" stop-color="#4EC9B0"/>
    </linearGradient>
    <clipPath id="win"><rect x="24" y="24" width="1152" height="452" rx="16"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1200" height="500" fill="#05070A"/>

  <!-- window -->
  <rect x="24" y="24" width="1152" height="452" rx="16" fill="#0A0E14" stroke="#1C2333" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- faint constellation background, clipped to window -->
  <g clip-path="url(#win)" stroke="#2BBC8A" fill="#2BBC8A" opacity="0.13">
    <line x1="980" y1="70" x2="1080" y2="120" stroke-width="1"/>
    <line x1="1080" y1="120" x2="1040" y2="210" stroke-width="1"/>
    <line x1="1080" y1="120" x2="1150" y2="90" stroke-width="1"/>
    <line x1="980" y1="70" x2="1040" y2="210" stroke-width="1"/>
    <line x1="120" y1="430" x2="240" y2="400" stroke-width="1"/>
    <line x1="240" y1="400" x2="300" y2="450" stroke-width="1"/>
    <circle cx="980" cy="70" r="3"/>
    <circle cx="1080" cy="120" r="3.5"/>
    <circle cx="1040" cy="210" r="3"/>
    <circle cx="1150" cy="90" r="2.5"/>
    <circle cx="120" cy="430" r="3"/>
    <circle cx="240" cy="400" r="3"/>
    <circle cx="300" cy="450" r="2.5"/>
  </g>

  <!-- title bar -->
  <circle cx="60" cy="62" r="8" fill="#FF5F56"/>
  <circle cx="88" cy="62" r="8" fill="#FFBD2E"/>
  <circle cx="116" cy="62" r="8" fill="#27C93F"/>
  <text x="160" y="68" fill="#5C6B7A" font-size="19">vaish@usc-viterbi:~/portfolio</text>
  <line x1="24" y1="92" x2="1176" y2="92" stroke="#1C2333" stroke-width="1.5"/>

  <!-- body -->
  <text x="60" y="158" font-size="28" xml:space="preserve"><tspan fill="#FF7B72">$</tspan><tspan fill="#E6EDF3"> cat profile.json</tspan></text>

  <text x="60" y="206" font-size="28" xml:space="preserve"><tspan fill="#7D8799">{ </tspan><tspan fill="#4EC9B0">role</tspan><tspan fill="#7D8799">: </tspan><tspan fill="#7EE787">"AI/ML Engineer"</tspan><tspan fill="#7D8799">,</tspan></text>

  <text x="60" y="254" font-size="28" xml:space="preserve"><tspan fill="#7D8799">  </tspan><tspan fill="#4EC9B0">focus</tspan><tspan fill="#7D8799">: [</tspan><tspan fill="#7EE787">"LLMs"</tspan><tspan fill="#7D8799">, </tspan><tspan fill="#7EE787">"RAG"</tspan><tspan fill="#7D8799">, </tspan><tspan fill="#7EE787">"multi-agent"</tspan><tspan fill="#7D8799">],</tspan></text>

  <text x="60" y="302" font-size="28" xml:space="preserve"><tspan fill="#7D8799">  </tspan><tspan fill="#4EC9B0">shipped</tspan><tspan fill="#7D8799">: </tspan><tspan fill="#7EE787">"production AI to 35K+ users @ Oracle"</tspan><tspan fill="#7D8799">,</tspan></text>

  <text x="60" y="350" font-size="28" xml:space="preserve"><tspan fill="#7D8799">  </tspan><tspan fill="#4EC9B0">research</tspan><tspan fill="#7D8799">: </tspan><tspan fill="#7EE787">"first-author · ACL 2026 · under review"</tspan><tspan fill="#7D8799">,</tspan></text>

  <text x="60" y="398" font-size="28" xml:space="preserve"><tspan fill="#7D8799">  </tspan><tspan fill="#4EC9B0">status</tspan><tspan fill="#7D8799">: </tspan><tspan fill="#7EE787">"open to AI/ML roles"</tspan><tspan fill="#7D8799"> }</tspan></text>

  <text x="60" y="446" font-size="28" xml:space="preserve"><tspan fill="#FF7B72">$</tspan><tspan fill="#E6EDF3"> </tspan></text>
  <rect x="84" y="426" width="15" height="26" fill="#2BBC8A">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
